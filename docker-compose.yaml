name: crushing-plant
services:
  db:
    image: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DEFAULT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${DEFAULT_DB_NAME}
    ports:
      - 5432:5432
    volumes:
      - db-volume:/var/lib/postgresql
      - ./CrushingPlant/CrushingPlantApi/Infrastructure/Database/Scripts:/docker-entrypoint-initdb.d

  api:
    build:
      context: ./CrushingPlant/CrushingPlantApi
      dockerfile: Dockerfile
    restart: always
    environment:
      - ConnectionStrings__PostgresConnection=Host=db;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=${DEFAULT_DB_NAME}
      - AppConfiguration__UpdateIntervalInSeconds=5
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - 5000:5000
    depends_on:
      - db

  frontend:
    build:
      context: ./Client/CrushingPlant.Client
      dockerfile: Dockerfile
    restart: always
    ports:
      - 80:80
    depends_on:
      - api

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
volumes:
  db-volume:
